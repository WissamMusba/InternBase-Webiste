<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - InternBase</title>
    <link rel="icon" type="image/svg+xml" href="../images/InternBase-logo.svg">
    <link rel="stylesheet" href="css/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Header with navigation and branding -->
    <header class="app-header">
        <div class="header-brand">
            <img src="../images/InternBase-logo.svg" alt="InternBase Logo" class="header-logo">
            <h1 class="app-title">InternBase Student Portal</h1>
        </div>
        <nav class="app-nav">
            <a href="browse.html" class="nav-link">Browse</a>
            <a href="applications.html" class="nav-link">Applications</a>
            <a href="profile.html" class="nav-link active">Profile</a>
            <button id="logoutBtn" class="app-logout-btn">Logout</button>
        </nav>
    </header>

    <!-- Main profile content -->
    <main class="container">
        <!-- Profile header with avatar and actions -->
        <div class="profile-header">
            <div class="profile-avatar">
                <img src="../images/icons/user.svg" alt="Student Avatar" id="studentAvatar">
                <button class="btn-edit" id="changeAvatarBtn" style="display: none;">Change Photo</button>
            </div>
            <div class="profile-info">
                <h2 id="studentName">Loading Student...</h2>
                <p class="text-muted" id="studentEmail">Loading Email...</p>
                <div class="profile-actions">
                    <a href="browse.html" class="btn-edit-profile">
                        <i class="fas fa-search"></i>
                        Browse Internships
                    </a>
                    <button class="btn-edit-profile" id="editProfileBtn">
                        <i class="fas fa-edit"></i>
                        Edit Profile
                    </button>
                </div>
            </div>
            <!-- Application and saved stats -->
            <div class="stats-grid">
                <div class="stat-card" onclick="location.href='applications.html'">
                    <h3><i class="fas fa-file-alt"></i> Applications</h3>
                    <p id="applicationCount">0</p>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-bookmark"></i> Saved</h3>
                    <p id="savedCount">0</p>
                </div>
            </div>
        </div>

        <!-- Profile details and edit form -->
        <div class="profile-section">
            <form id="studentProfileForm" class="profile-form">
                <div class="section-header">
                    <h3>Personal Information</h3>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="inputStudentName" name="student_name" value="" readonly required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="inputEmail" name="email" value="" readonly required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Major</label>
                        <input type="text" id="inputMajor" name="major" value="" readonly>
                    </div>
                    <div class="form-group">
                        <label>University</label>
                        <input type="text" id="inputUniversity" name="university" value="" readonly>
                    </div>
                </div>

                <div class="form-group">
                    <label>Skills (comma-separated)</label>
                    <textarea id="inputSkills" name="skills" rows="3" readonly></textarea>
                </div>

                <div class="form-group">
                    <label>Member Since</label>
                    <input type="text" id="joinDate" value="Loading..." readonly>
                </div>

                <!-- Edit and save/cancel buttons, shown only in edit mode -->
                <div class="form-actions" id="profileFormActions" style="display: none;">
                    <button type="button" class="btn-secondary" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn-primary" id="saveProfileBtn">Save Changes</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Handles profile page interactivity and data -->
    <script src="js/student.js"></script>
</body>
</html>
