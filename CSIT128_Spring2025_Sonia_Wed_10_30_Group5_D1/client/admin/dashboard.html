<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard - InternBase</title>
    <link rel="icon" type="image/svg+xml" href="../images/InternBase-logo.svg">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <!-- Header with navigation and branding -->
    <header class="app-header">
        <div class="header-brand">
            <img src="../images/InternBase-logo.svg" alt="InternBase Logo" class="header-logo">
            <h1 class="app-title">InternBase Company Dashboard</h1>
        </div>
        <nav class="app-nav">
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="internships.html" class="nav-link">Internships</a>
            <a href="applications.html" class="nav-link">Applications</a>
            <a href="profile.html" class="nav-link">Profile</a>
            <button id="logoutBtn" class="app-logout-btn">Logout</button>
        </nav>
    </header>

    <!-- Main dashboard content -->
    <main class="container">
        <!-- Welcome message and quick stats -->
        <div class="welcome">
            <h2>Welcome back!</h2>
            <p>Quick stats about your internship program:</p>
        </div>

        <!-- Dashboard statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Active Internships</h3>
                <p id="activeInternships">0</p>
            </div>
            <div class="stat-card">
                <h3>New Applications</h3>
                <p id="newApplications">0</p>
            </div>
            <div class="stat-card">
                <h3>Shortlisted</h3>
                <p id="shortlisted">0</p>
            </div>
        </div>

        <!-- Recent applications table -->
        <div class="recent-activity">
            <h3>Recent Applications</h3>
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Position</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recentApplications">
                    <!-- Filled by JavaScript -->
                </tbody>
            </table>
        </div>
    </main>
    <!-- Handles dashboard interactivity and data -->
    <script src="js/admin.js"></script>
</body>
</html>
