<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Signup - InternBase</title>
    <link rel="icon" type="image/svg+xml" href="../images/InternBase-logo.svg">
    <link rel="stylesheet" href="css/student.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <!-- Signup Page Container -->
    <div class="auth-page-container">
        <!-- Signup Card -->
        <div class="auth-card">
            <!-- Header with logo and title -->
            <div class="auth-header">
                <img src="../images/InternBase-logo.svg" alt="InternBase Logo" class="auth-logo">
                <h2 class="auth-title">Student Registration</h2>
            </div>
            <!-- Signup Form -->
            <form id="studentSignupForm" class="auth-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input
                        type="text"
                        id="fullName"
                        name="name"
                        placeholder="John Smith"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">University Email</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="student@university.edu"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create password (8+ characters)"
                        minlength="8"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input
                        type="password"
                        id="confirmPassword"
                        name="confirmPassword"
                        placeholder="Re-enter your password"
                        required
                    >
                </div>

                <button type="submit" class="auth-btn-primary">Register</button>

                <div class="form-footer">
                    <p>Already registered? <a href="login.html">Login here</a></p>
                </div>
            </form>
        </div>
        <!-- Link to return to main site -->
        <div class="back-to-main">
            <a href="../index.html">Back to Main Site</a>
        </div>
    </div>
    <!-- Handles signup form functionality -->
    <script src="js/student.js"></script>
</body>
</html>
